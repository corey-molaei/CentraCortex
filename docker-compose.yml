version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-centracortex}
      POSTGRES_USER: ${POSTGRES_USER:-centracortex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-centracortex}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-centracortex} -d ${POSTGRES_DB:-centracortex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["/bin/sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "worker", "--loglevel=info"]
    volumes:
      - ./backend:/app
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "beat", "--loglevel=info"]
    volumes:
      - ./backend:/app
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5173:5173"
      - "1455:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  qdrant_data:
