[tool.ruff]
line-length = 140
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["UP017"]

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = [
    "Depends",
    "File",
    "Query",
    "Header",
    "fastapi.Depends",
    "fastapi.File",
    "fastapi.Query",
    "fastapi.Header",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
